# Automated daily siltation check
# 1. Wakes up at 2AM Malaysia time (18:00 UTC) every day
# 2. Runs alert_system.py — fetches latest GEE data for both zones
# 3. Logs alerts to Supabase and broadcasts Telegram notifications
# 4. Data is written to Supabase (not committed to repo)

name: Daily Siltation Check

on:
  schedule:
    - cron: '0 18 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  daily-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install earthengine-api pandas supabase requests diskcache

      - name: Write GEE service account credentials
        run: |
          echo '${{ secrets.EARTHENGINE_TOKEN }}' > service_account.json

      - name: Run daily siltation check
        env:
          EARTHENGINE_TOKEN:   ${{ secrets.EARTHENGINE_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python alert_system.py

      - name: Remove credentials
        if: always()
        run: |
          rm -f service_account.json
